<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EksenPortal</title>

  <style>
    :root {
      --bg: #000000;
      --fg: rgba(255, 255, 255, 0.96);
      --soft: rgba(255, 255, 255, 0.68);
      --faint: rgba(255, 255, 255, 0.34);
      --line: rgba(255, 255, 255, 0.28);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: white;
      overflow: hidden;
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .wrap {
      width: min(90%, 420px);
      position: relative;
    }

    .dot {
      width: 4px;
      height: 4px;
      background: #fff;
      border-radius: 50%;
      margin: 0 auto 30px auto;
      opacity: 0.95;
      transform: scale(1);
      transition: opacity 1.2s var(--ease);
    }

    .breath {
      animation: breath 2.8s ease-in-out infinite;
    }

    @keyframes breath {
      0%, 100% {
        opacity: 0.86;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.08);
      }
    }

    .text {
      opacity: 0;
      margin: 12px 0;
      transition:
        opacity 1.4s var(--ease),
        transform 1.8s var(--ease);
      transform: scale(1);
    }

    .show {
      opacity: 1;
    }

    .small {
      font-size: 14px;
      color: var(--faint);
    }

    .mid {
      font-size: 22px;
      color: var(--soft);
    }

    .big {
      font-size: 30px;
      color: var(--fg);
      transform: scale(0.985);
    }

    .big.show {
      transform: scale(1);
    }

    .questionWrap {
      opacity: 0;
      margin-top: 28px;
      transition: opacity 1.2s var(--ease);
    }

    .questionWrap.show {
      opacity: 1;
    }

    .question {
      font-size: 24px;
      line-height: 1.35;
      margin-bottom: 18px;
      color: var(--fg);
    }

    .entry {
      width: min(82vw, 280px);
      margin-top: 10px;
      border: none;
      border-bottom: 1px solid var(--line);
      background: none;
      color: white;
      text-align: center;
      font-size: 18px;
      font-family: inherit;
      outline: none;
      padding: 8px 6px 10px;
    }

    .entry::placeholder {
      color: rgba(255, 255, 255, 0.16);
    }

    .hint {
      margin-top: 14px;
      font-size: 14px;
      color: var(--soft);
      opacity: 0;
      transition: opacity 1.4s var(--ease);
    }

    .hint.show {
      opacity: 0.62;
    }

    .hide-soft {
      opacity: 0 !important;
      transition: opacity 1.2s var(--ease) !important;
    }

    .questionWrap.hide-soft {
      opacity: 0 !important;
    }
  </style>
</head>
<body>

  <div class="wrap" id="wrap">
    <div id="dot" class="dot"></div>

    <div id="line1" class="text small">zaten vardı</div>
    <div id="line2" class="text mid">burada</div>
    <div id="line3" class="text big">bir şey var</div>
    <div id="line4" class="text mid">gör</div>

    <div id="questionWrap" class="questionWrap">
      <div class="question">şu an seni ne çağırıyor?</div>
      <input id="entry" class="entry" type="text" placeholder="bir şey yaz..." />
      <div id="hint" class="hint"></div>
    </div>
  </div>

  <script>
    const VISITED_KEY = "eksenportal_visit_v_final";

    const firstVisit = !localStorage.getItem(VISITED_KEY);
    localStorage.setItem(VISITED_KEY, "1");

    const dot = document.getElementById("dot");
    const wrap = document.getElementById("wrap");

    const line1 = document.getElementById("line1");
    const line2 = document.getElementById("line2");
    const line3 = document.getElementById("line3");
    const line4 = document.getElementById("line4");

    const questionWrap = document.getElementById("questionWrap");
    const entry = document.getElementById("entry");
    const hint = document.getElementById("hint");

    const texts = [line1, line2, line3, line4];

    hint.innerText = firstVisit ? "alanını hazırla" : "küçük başla";

    function show(el) {
      el.classList.add("show");
    }

    if (firstVisit) {
      // İLK GİRİŞ / SABAH / DERİN AÇILIŞ
      setTimeout(() => show(line1), 500);    // zaten vardı
      setTimeout(() => show(line2), 2000);   // burada
      setTimeout(() => show(line3), 4000);   // bir şey var
      setTimeout(() => show(line4), 6500);   // gör

      setTimeout(() => {
        dot.classList.add("breath");
      }, 8500);

      setTimeout(() => {
        dot.classList.remove("breath");
        questionWrap.classList.add("show");
        entry.focus({ preventScroll: true });
      }, 10000);

      setTimeout(() => {
        hint.classList.add("show");
      }, 12000);

    } else {
      // TEKRAR GİRİŞ / GÜN İÇİ / KISA AÇILIŞ
      line1.style.display = "none";

      setTimeout(() => show(line2), 400);    // burada
      setTimeout(() => show(line3), 1800);   // bir şey var
      setTimeout(() => show(line4), 3400);   // gör

      setTimeout(() => {
        dot.classList.add("breath");
      }, 4300);

      setTimeout(() => {
        dot.classList.remove("breath");
        questionWrap.classList.add("show");
        entry.focus({ preventScroll: true });
      }, 5500);

      setTimeout(() => {
        hint.classList.add("show");
      }, 6500);
    }

    entry.addEventListener("keydown", function (e) {
      if (e.key !== "Enter") return;

      setTimeout(() => {
        texts.forEach(t => t.classList.add("hide-soft"));
        questionWrap.classList.add("hide-soft");
      }, 350);

      // Sadece nokta kalır
      setTimeout(() => {
        line1.style.display = "none";
        line2.style.display = "none";
        line3.style.display = "none";
        line4.style.display = "none";
        questionWrap.style.display = "none";
      }, 1700);
    });
  </script>

</body>
</html>
