<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>EksenPortal</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.container {
  text-align: center;
}

.text {
  opacity: 0;
  font-size: 34px;
  transition: opacity 2.8s ease;
  letter-spacing: 0.03em;
}

.options {
  margin-top: 20px;
  font-size: 16px;
  opacity: 0;
  transition: opacity 2s ease;
  line-height: 1.8;
}

.input-box {
  margin-top: 20px;
  opacity: 0;
  transition: opacity 2s ease;
}

input {
  background: transparent;
  border: none;
  border-bottom: 1px solid white;
  color: white;
  font-size: 18px;
  outline: none;
  text-align: center;
  width: 250px;
}
</style>
</head>

<body>

<div class="container">
  <div class="text" id="text"></div>

  <div class="options" id="options">
    <div onclick="selectOption('stay')">burada kal</div>
    <div onclick="selectOption('write')">yaz</div>
    <div onclick="selectOption('act')">harekete geç</div>
  </div>

  <div class="input-box" id="inputBox">
    <div class="text" id="actionText">şu an neye yöneliyorsun?</div>
    <input type="text" />
  </div>
</div>

<script>
const text = document.getElementById("text");
const options = document.getElementById("options");
const inputBox = document.getElementById("inputBox");

const sequence = [
  { word: "", show: 1400, hide: 0 },
  { word: "Kal", show: 3400, hide: 2400 },
  { word: "Bak", show: 2800, hide: 2400 },
  { word: "Gör", show: 3400, hide: 4000 },
  { word: "şimdi neye yöneliyorsun?", show: 4000, hide: 0 }
];

let index = 0;

function playSequence() {
  if (index >= sequence.length) return;

  const step = sequence[index];

  text.style.opacity = 0;

  setTimeout(() => {
    text.textContent = step.word;

    if (step.word !== "") {
      text.style.opacity = 1;
    }

    setTimeout(() => {
      text.style.opacity = 0;
      index++;

      if (index === sequence.length) {
        setTimeout(() => {
          options.style.opacity = 1;
        }, 500);
      } else {
        setTimeout(playSequence, step.hide);
      }

    }, step.show);

  }, 400);
}

playSequence();

function selectOption(type) {
  options.style.opacity = 0;

  if (type === "act") {
    setTimeout(() => {
      inputBox.style.opacity = 1;
    }, 500);
  }

  if (type === "stay") {
    fadeOut();
  }

  if (type === "write") {
    setTimeout(() => {
      inputBox.style.opacity = 1;
    }, 500);
  }
}

function fadeOut() {
  document.body.style.transition = "opacity 4s ease";
  document.body.style.opacity = 0;
}

// dokununca reset
document.body.addEventListener("click", () => {
  location.reload();
});
</script>

</body>
</html>
