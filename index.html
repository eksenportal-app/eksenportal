<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>EksenPortal</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.container {
  text-align: center;
}

.text {
  opacity: 0;
  font-size: 34px;
  transition: opacity 2.8s ease;
  letter-spacing: 0.03em;
}

.options {
  margin-top: 20px;
  font-size: 16px;
  opacity: 0;
  transition: opacity 2s ease;
  line-height: 1.8;
}
</style>
</head>

<body>

<div class="container">
  <div class="text" id="text"></div>
  <div class="options" id="options">
    burada kal<br>
    yaz<br>
    harekete geç
  </div>
</div>

<script>
const text = document.getElementById("text");
const options = document.getElementById("options");

const sequence = [
  { word: "", show: 1400, hide: 0 },
  { word: "Kal", show: 3400, hide: 2400 },
  { word: "Bak", show: 2800, hide: 2400 },
  { word: "Gör", show: 3400, hide: 4000 },
  { word: "şimdi neye yöneliyorsun?", show: 4000, hide: 0 }
];

let index = 0;

function playSequence() {
  if (index >= sequence.length) {
    return;
  }

  const step = sequence[index];

  text.style.opacity = 0;

  setTimeout(() => {
    text.textContent = step.word;

    if (step.word !== "") {
      text.style.opacity = 1;
    }

    setTimeout(() => {
      text.style.opacity = 0;
      index++;

      if (index === sequence.length) {
        // seçenekleri göster
        setTimeout(() => {
          options.style.opacity = 1;
        }, 500);
      } else {
        setTimeout(playSequence, step.hide);
      }

    }, step.show);

  }, 400);
}

playSequence();

// dokununca reset
document.body.addEventListener("click", () => {
  index = 0;
  options.style.opacity = 0;
  playSequence();
});
</script>

</body>
</html>
