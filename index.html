<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <title>EksenPortal</title>

  <style>
    :root {
      --bg: #000000;
      --fg: rgba(255,255,255,0.95);
      --soft: rgba(255,255,255,0.78);
      --faint: rgba(255,255,255,0.40);
      --line: rgba(255,255,255,0.26);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      overflow: hidden;
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app {
      width: min(92vw, 420px);
      padding: 24px 18px;
      text-align: center;
    }

    .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      margin: 0 auto 34px;
      opacity: 0.95;
      transform: scale(1);
    }

    .dot.breathing {
      animation: dotBreath 2.8s ease-in-out infinite;
    }

    @keyframes dotBreath {
      0%, 100% {
        opacity: 0.92;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.08);
      }
    }

    .line {
      opacity: 0;
      transition: opacity 1.2s var(--ease);
      min-height: 26px;
      letter-spacing: 0.01em;
    }

    .line.show {
      opacity: 1;
    }

    .t1 {
      font-size: 14px;
      color: var(--faint);
      margin-bottom: 12px;
    }

    .t2 {
      font-size: 21px;
      color: var(--soft);
      margin-bottom: 18px;
    }

    .t3 {
      font-size: 28px;
      color: var(--fg);
      margin-bottom: 18px;
    }

    .t4 {
      font-size: 21px;
      color: var(--soft);
      margin-bottom: 8px;
    }

    .question-wrap {
      opacity: 0;
      transition: opacity 1.2s var(--ease);
      margin-top: 28px;
    }

    .question-wrap.show {
      opacity: 1;
    }

    .question {
      font-size: 24px;
      line-height: 1.35;
      margin-bottom: 20px;
      color: var(--fg);
    }

    .entry {
      width: min(82vw, 280px);
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--line);
      color: var(--fg);
      text-align: center;
      font: inherit;
      font-size: 18px;
      outline: none;
      padding: 10px 8px 12px;
    }

    .entry::placeholder {
      color: rgba(255,255,255,0.16);
    }

    .hint {
      opacity: 0;
      transition: opacity 1.4s var(--ease);
      margin-top: 16px;
      font-size: 14px;
      color: var(--soft);
    }

    .hint.show {
      opacity: 1;
    }

    .fade-out {
      animation: fadeOut 4.2s var(--ease) forwards;
    }

    @keyframes fadeOut {
      to { opacity: 0; }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <div id="dot" class="dot"></div>

    <div id="line1" class="line t1">zaten vardı</div>
    <div id="line2" class="line t2">burada</div>
    <div id="line3" class="line t3">bir şey var</div>
    <div id="line4" class="line t4">gör</div>

    <section id="questionWrap" class="question-wrap">
      <div class="question">şu an seni ne çağırıyor?</div>
      <input id="entry" class="entry" type="text" placeholder="bir şey yaz…" maxlength="120" />
      <div id="hint" class="hint"></div>
    </section>
  </main>
