<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>EksenPortal</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .text {
      opacity: 0;
      font-size: 28px;
      transition: opacity 1.2s ease;
    }

    .show {
      opacity: 1;
    }
  </style>
</head>

<body>

<div class="text" id="text">Kal</div>

<script>
  setTimeout(() => {
    document.getElementById("text").classList.add("show");
  }, 1200);
</script>

</body>
</html>
