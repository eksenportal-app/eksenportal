<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>EksenPortal</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.container {
  text-align: center;
}

.text {
  opacity: 0;
  font-size: 34px;
  transition: opacity 3.5s ease;
  letter-spacing: 0.04em;
}

.soft {
  font-size: 20px;
  opacity: 0.6;
}

.input-box {
  margin-top: 25px;
  opacity: 0;
  transition: opacity 2.5s ease;
}

input {
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.5);
  color: white;
  font-size: 18px;
  outline: none;
  text-align: center;
  width: 260px;
}
</style>
</head>

<body>

<div class="container">
  <div class="text" id="text"></div>

  <div class="input-box" id="inputBox">
    <input type="text" placeholder="..." />
    <div class="soft">alanını kur</div>
  </div>
</div>

<script>
const text = document.getElementById("text");
const inputBox = document.getElementById("inputBox");

const sequence = [
  { word: "", show: 2000, hide: 0 },                 // alan (hisset)
  { word: "bir şey var", show: 4500, hide: 2000 },   // sezgi (uzun kalır)
  { word: "gör", show: 3000, hide: 2000 }            // yumuşak geçiş
];

let index = 0;

function playSequence() {
  if (index >= sequence.length) {
    // input açılıyor (aksiyon alanı)
    setTimeout(() => {
      inputBox.style.opacity = 1;
    }, 800);
    return;
  }

  const step = sequence[index];

  text.style.opacity = 0;

  setTimeout(() => {
    text.textContent = step.word;

    if (step.word !== "") {
      text.style.opacity = 1;
    }

    setTimeout(() => {
      text.style.opacity = 0;
      index++;
      setTimeout(playSequence, step.hide);
    }, step.show);

  }, 400);
}

playSequence();

// yazdıktan sonra yumuşak kapanış
document.querySelector("input").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    fadeOut();
  }
});

function fadeOut() {
  document.body.style.transition = "opacity 5s ease";
  document.body.style.opacity = 0;
}

// dokununca reset
document.body.addEventListener("click", () => {
  location.reload();
});
</script>

</body>
</html>
