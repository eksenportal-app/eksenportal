<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>EksenPortal</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  text-align: center;
}

.text {
  opacity: 0;
  font-size: 34px;
  transition: opacity 3s ease;
}

.input-box {
  margin-top: 25px;
  opacity: 0;
  transition: opacity 2s ease;
}

input {
  background: transparent;
  border: none;
  border-bottom: 1px solid white;
  color: white;
  font-size: 18px;
  outline: none;
  text-align: center;
  width: 260px;
}

.soft {
  margin-top: 10px;
  font-size: 16px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="container">
  <div class="text" id="text"></div>

  <div class="input-box" id="inputBox">
    <input type="text" />
    <div class="soft" id="actionText"></div>
  </div>
</div>

<script>
const text = document.getElementById("text");
const inputBox = document.getElementById("inputBox");
const actionText = document.getElementById("actionText");

// daha önce girilmiş mi?
let firstTime = !localStorage.getItem("visited");

// girişten sonra işaretle
localStorage.setItem("visited", "true");

// mod seçimi
let mode = firstTime ? "deep" : "daily";

// metin akışı
let sequence = [
  { word: "", show: mode === "deep" ? 2000 : 1000 },
  { word: "bir şey var", show: 4000 },
  { word: "gör", show: 2500 }
];

let index = 0;

function play() {
  if (index >= sequence.length) {
    setTimeout(() => {
      inputBox.style.opacity = 1;
    }, 800);
    return;
  }

  const step = sequence[index];

  text.style.opacity = 0;

  setTimeout(() => {
    text.textContent = step.word;
    text.style.opacity = 1;

    setTimeout(() => {
      text.style.opacity = 0;
      index++;
      setTimeout(play, 1500);
    }, step.show);

  }, 300);
}

play();

// aksiyon metni
if (mode === "deep") {
  actionText.textContent = "alanını kur";
} else {
  actionText.textContent = "küçük bir adım";
}

// enter → kapanış
document.querySelector("input").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    document.body.style.transition = "opacity 4s ease";
    document.body.style.opacity = 0;
  }
});
</script>

</body>
</html>
