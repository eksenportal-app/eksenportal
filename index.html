<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>EksenPortal</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .text {
      opacity: 0;
      font-size: 34px;
      transition: opacity 2.8s ease;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>

  <div class="text" id="text"></div>

  <script>
    const text = document.getElementById("text");

    const sequence = [
      { word: "", show: 1400, hide: 0 },
      { word: "Kal", show: 3400, hide: 2400 },
      { word: "Bak", show: 2800, hide: 2400 },
      { word: "Gör", show: 3400, hide: 4000 } // ← boşluk uzadı
    ];

    let index = 0;

    function playSequence() {
      if (index >= sequence.length) {
        index = 0; // 🔁 döngü
      }

      const step = sequence[index];

      text.style.opacity = 0;

      setTimeout(() => {
        text.textContent = step.word;

        if (step.word !== "") {
          text.style.opacity = 1;
        }

        setTimeout(() => {
          text.style.opacity = 0;
          index++;

          setTimeout(playSequence, step.hide);
        }, step.show);

      }, 400);
    }

    playSequence();
  </script>

</body>
</html>
