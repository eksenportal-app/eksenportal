<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EksenPortal</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family: Georgia, serif;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  text-align:center;
}

.container { width:90%; max-width:400px; }

.dot {
  width:4px; height:4px;
  background:#fff;
  border-radius:50%;
  margin:0 auto 30px;
}

.breath { animation: breath 2.5s infinite; }

@keyframes breath {
  0%,100% { opacity:0.8; transform:scale(1); }
  50% { opacity:1; transform:scale(1.1); }
}

.text { opacity:0; transition:opacity 1.2s; margin:10px 0; }
.show { opacity:1; }

.small { font-size:14px; opacity:0.5; }
.mid { font-size:20px; opacity:0.8; }
.big { font-size:26px; }

.input { 
  margin-top:20px; 
  border:none; 
  border-bottom:1px solid rgba(255,255,255,0.3);
  background:none;
  color:white;
  text-align:center;
  font-size:18px;
  outline:none;
}

.action {
  margin-top:15px;
  opacity:0.6;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">
  <div id="dot" class="dot"></div>

  <div id="t1" class="text small">zaten vardı</div>
  <div id="t2" class="text mid">burada</div>
  <div id="t3" class="text big">bir şey var</div>
  <div id="t4" class="text mid">gör</div>

  <div id="question" class="text">
    <div style="margin-top:30px;">şu an seni ne çağırıyor?</div>
    <input class="input" placeholder="bir şey yaz..." />
    <div id="action" class="action"></div>
  </div>
</div>

<script>
const firstVisit = !localStorage.getItem("visited");
localStorage.setItem("visited", "1");

const actionText = firstVisit ? "alanını hazırla" : "küçük başla";
document.getElementById("action").innerText = actionText;

function show(id, delay){
  setTimeout(()=>document.getElementById(id).classList.add("show"), delay);
}

show("t1", 500);
show("t2", 1500);
show("t3", 2800);
show("t4", 4200);

// gör sonrası sessizlik + nefes
setTimeout(()=>{
  document.getElementById("dot").classList.add("breath");
}, 4800);

setTimeout(()=>{
  document.getElementById("dot").classList.remove("breath");
  document.getElementById("question").classList.add("show");
}, 6000);
</script>

</body>
</html>
