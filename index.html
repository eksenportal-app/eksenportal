<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>EksenPortal</title>

<style>
body {
  margin:0;
  background:#000;
  color:white;
  font-family: Georgia, serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

.dot {
  width:4px;
  height:4px;
  background:white;
  border-radius:50%;
  margin:20px auto;
}

.text {
  opacity:0;
  transition:opacity 1.2s;
}

.show {
  opacity:1;
}
</style>
</head>

<body>

<div>
  <div class="dot"></div>

  <div id="t1" class="text">zaten vardı</div>
  <div id="t2" class="text">burada</div>
  <div id="t3" class="text">bir şey var</div>
  <div id="t4" class="text">gör</div>
</div>

<script>
setTimeout(()=>t1.classList.add("show"),1000);
setTimeout(()=>t2.classList.add("show"),2500);
setTimeout(()=>t3.classList.add("show"),4000);
setTimeout(()=>t4.classList.add("show"),5500);
</script>

</body>
</html>
